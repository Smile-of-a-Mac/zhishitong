<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智审通 系统架构图</title>
  <style>
    body { margin: 0; display: flex; flex-direction: column; align-items: center; background: #f5f5f7; padding: 20px; font-family: -apple-system, sans-serif; }
    h1 { color: #1d1d1f; font-size: 24px; margin-bottom: 8px; }
    h2 { color: #86868b; font-size: 16px; margin-bottom: 24px; }
    .diagram { margin-bottom: 40px; max-width: 100%; }
    .diagram img { max-width: 100%; box-shadow: 0 2px 12px rgba(0,0,0,0.08); border-radius: 8px; }
    .diagram h3 { color: #1d1d1f; font-size: 18px; margin-bottom: 12px; }
    nav { margin-bottom: 30px; display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
    nav a { padding: 6px 14px; background: rgba(0,122,255,0.1); color: #007aff; border-radius: 16px; text-decoration: none; font-size: 14px; }
    nav a:hover { background: rgba(0,122,255,0.2); }
  </style>
</head>
<body>
  <h1>智审通 — 系统设计图集 v5.0</h1>
  <h2>高校行政审批自动化 Agent · 最后更新 2026-05-28</h2>

  <nav>
    <a href="#usecase">用例图</a>
    <a href="#architecture">系统架构</a>
    <a href="#state">审批状态机</a>
    <a href="#sequence_approval">审批时序</a>
    <a href="#sequence_ocr">OCR时序</a>
    <a href="#class">数据模型</a>
    <a href="#activity_lora">LoRA管线</a>
    <a href="#deployment">部署架构</a>
  </nav>

  <div class="diagram" id="usecase">
    <h3>📋 用例图（按角色）</h3>
    <img src="diagrams/usecase.svg" alt="智审通用例图 v5.0" />
  </div>

  <div class="diagram" id="architecture">
    <h3>🏗️ 系统架构图</h3>
    <img src="diagrams/architecture.svg" alt="智审通系统架构图" />
  </div>

  <div class="diagram" id="state">
    <h3>🔄 审批记录状态机</h3>
    <img src="diagrams/state_approval.svg" alt="审批状态机" />
  </div>

  <div class="diagram" id="sequence_approval">
    <h3>📝 多阶段审批流程时序图（以报销为例）</h3>
    <img src="diagrams/sequence_approval.svg" alt="审批流程时序图" />
  </div>

  <div class="diagram" id="sequence_ocr">
    <h3>📷 智能 OCR 多级降级处理流程</h3>
    <img src="diagrams/sequence_ocr.svg" alt="OCR处理流程时序图" />
  </div>

  <div class="diagram" id="class">
    <h3>🗃️ 数据模型类图（15 张表）</h3>
    <img src="diagrams/class_diagram.svg" alt="数据模型类图" />
  </div>

  <div class="diagram" id="activity_lora">
    <h3>🧪 LoRA 微调管线活动图</h3>
    <img src="diagrams/activity_lora.svg" alt="LoRA微调管线" />
  </div>

  <div class="diagram" id="deployment">
    <h3>🚀 部署架构图（多容器方案）</h3>
    <img src="diagrams/deployment.svg" alt="部署架构图" />
  </div>
</body>
</html>
